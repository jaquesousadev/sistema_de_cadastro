<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Usuários</title>
  <link rel="icon" type="image/png" href="./images/logojalves.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            roboto: ['Roboto', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
</head>
<body class="bg-gray-100 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-roboto transition-colors duration-300">

  <div class="max-w-7xl mx-auto px-4 py-6">
    
    <!-- Top bar -->
    <div class="flex items-center justify-between mb-6">
      <button onclick="window.location.href = 'dashboard.html'" class="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300 hover:text-indigo-600">
        <i class="fas fa-arrow-left"></i> Voltar
      </button>

      <button onclick="document.documentElement.classList.toggle('dark')" class="px-3 py-1 bg-gray-200 dark:bg-gray-700 text-sm rounded hover:bg-gray-300 dark:hover:bg-gray-600">
        Alternar Tema 🌗
      </button>
    </div>

    <!-- Título -->
    <h1 class="text-2xl font-bold mb-4">Lista de Usuários</h1>

    <!-- Lista de usuários -->
    <div id="user-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Os cards serão inseridos via JS -->
    </div>
  </div>

  <script src="javascripts/list_users.js"></script>
</body>
</html>
