<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Usuario</title>
  <link rel="icon" type="image/png" href="./images/logojalves.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 overflow-x-hidden">
  <button
    id="menuToggle"
    class="fixed left-4 top-4 z-50 inline-flex h-11 w-11 items-center justify-center rounded-lg bg-slate-950 text-white shadow-sm transition hover:bg-slate-800 md:hidden"
    type="button"
    title="Abrir menu"
    aria-label="Abrir menu"
  >
    <i class="fas fa-bars"></i>
  </button>

  <div id="sidebarOverlay" class="fixed inset-0 z-40 hidden bg-slate-950/50 md:hidden"></div>

  <aside
    id="sidebar"
    class="fixed inset-y-0 left-0 z-50 flex w-72 -translate-x-full flex-col border-r border-slate-800 bg-slate-950 text-white transition-transform duration-300 md:translate-x-0"
  >
    <div class="flex h-20 items-center gap-3 border-b border-white/10 px-6">
      <img src="./images/logojalves.png" alt="Logo" class="h-10 w-10 rounded-lg bg-white object-contain p-1" />
      <div>
        <p class="text-sm text-slate-300">Sistema</p>
        <h1 class="text-lg font-semibold leading-tight">Cadastro</h1>
      </div>
    </div>

    <nav class="flex-1 space-y-1 px-4 py-6">
      <a href="dashboard.html" class="flex items-center gap-3 rounded-lg px-3 py-3 text-sm font-medium text-slate-300 transition hover:bg-white/10 hover:text-white">
        <i class="fas fa-chart-line w-5 text-center"></i>
        Dashboard
      </a>
      <a href="register_client.html" class="flex items-center gap-3 rounded-lg px-3 py-3 text-sm font-medium text-slate-300 transition hover:bg-white/10 hover:text-white">
        <i class="fas fa-user-plus w-5 text-center"></i>
        Cadastro de Clientes
      </a>
      <a href="list_clients.html" class="flex items-center gap-3 rounded-lg px-3 py-3 text-sm font-medium text-slate-300 transition hover:bg-white/10 hover:text-white">
        <i class="fas fa-users w-5 text-center"></i>
        Lista de Clientes
      </a>
      <a href="list_users.html" class="flex items-center gap-3 rounded-lg px-3 py-3 text-sm font-medium text-slate-300 transition hover:bg-white/10 hover:text-white">
        <i class="fas fa-user-cog w-5 text-center"></i>
        Lista de Usuarios
      </a>
      <a href="#" class="flex items-center gap-3 rounded-lg px-3 py-3 text-sm font-medium text-slate-300 transition hover:bg-white/10 hover:text-white">
        <i class="fas fa-file-lines w-5 text-center"></i>
        Relatorios
      </a>
    </nav>

    <div class="border-t border-white/10 p-4">
      <button
        id="logoutButton"
        class="flex w-full items-center justify-center gap-2 rounded-lg bg-rose-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-rose-700"
        type="button"
      >
        <i class="fas fa-right-from-bracket"></i>
        Sair
      </button>
    </div>
  </aside>

  <main class="min-h-screen px-4 pb-8 pt-20 sm:px-6 md:ml-72 md:px-8 md:pt-8">
    <header class="mb-8 flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
      <div>
        <p class="text-sm font-medium uppercase tracking-wide text-slate-500">Administracao</p>
        <h2 class="mt-1 text-3xl font-bold tracking-tight text-slate-950">Novo usuario</h2>
        <p class="mt-2 max-w-2xl text-sm text-slate-600">
          Cadastre um acesso para usuarios que podem entrar no sistema.
        </p>
      </div>

      <a href="list_users.html" class="inline-flex w-fit items-center justify-center gap-2 rounded-lg border border-slate-200 bg-white px-4 py-3 text-sm font-semibold text-slate-800 transition hover:bg-slate-100">
        <i class="fas fa-arrow-left"></i>
        Voltar para usuarios
      </a>
    </header>

    <section id="formFeedback" class="mb-6 hidden rounded-lg border p-4 text-sm"></section>

    <form id="register-form" class="space-y-6">
      <section class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
        <div class="mb-5 flex items-center gap-3">
          <span class="inline-flex h-10 w-10 items-center justify-center rounded-lg bg-sky-50 text-sky-700">
            <i class="fas fa-user-shield"></i>
          </span>
          <div>
            <h3 class="text-lg font-semibold text-slate-950">Dados de acesso</h3>
            <p class="text-sm text-slate-500">Informe nome de usuario, email e senha inicial.</p>
          </div>
        </div>

        <div class="grid grid-cols-1 gap-4 lg:grid-cols-2">
          <div>
            <label for="username" class="mb-2 block text-sm font-medium text-slate-700">Usuario</label>
            <input type="text" class="form-input" id="username" name="username" placeholder="Nome de usuario" autocomplete="username" required />
          </div>
          <div>
            <label for="email" class="mb-2 block text-sm font-medium text-slate-700">Email</label>
            <input type="email" class="form-input" id="email" name="email" placeholder="usuario@empresa.com.br" autocomplete="email" required />
          </div>
          <div class="lg:col-span-2">
            <label for="password" class="mb-2 block text-sm font-medium text-slate-700">Senha</label>
            <div class="relative">
              <input type="password" class="form-input pr-12" id="password" name="password" placeholder="Senha de acesso" autocomplete="new-password" required />
              <button type="button" class="password-toggle" data-target="password" title="Mostrar ou ocultar senha" aria-label="Mostrar ou ocultar senha">
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>
        </div>
      </section>

      <div class="sticky bottom-0 -mx-4 border-t border-slate-200 bg-slate-50/95 px-4 py-4 backdrop-blur sm:-mx-6 sm:px-6 md:-mx-8 md:px-8">
        <div class="flex flex-col-reverse gap-3 sm:flex-row sm:justify-end">
          <a href="list_users.html" class="inline-flex items-center justify-center gap-2 rounded-lg border border-slate-200 bg-white px-5 py-3 text-sm font-semibold text-slate-800 transition hover:bg-slate-100">
            <i class="fas fa-arrow-left"></i>
            Cancelar
          </a>
          <button id="submitButton" type="submit" class="inline-flex items-center justify-center gap-2 rounded-lg bg-slate-950 px-5 py-3 text-sm font-semibold text-white transition hover:bg-slate-800 disabled:cursor-not-allowed disabled:opacity-70">
            <i class="fas fa-floppy-disk"></i>
            Salvar usuario
          </button>
        </div>
      </div>
    </form>
  </main>

  <style>
    .form-input {
      width: 100%;
      border-radius: 0.5rem;
      border: 1px solid #cbd5e1;
      background: #fff;
      padding: 0.75rem 0.875rem;
      color: #0f172a;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .form-input:focus {
      border-color: #0f172a;
      box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.12);
    }

    .password-toggle {
      position: absolute;
      right: 0.375rem;
      top: 50%;
      display: inline-flex;
      height: 2.25rem;
      width: 2.25rem;
      transform: translateY(-50%);
      align-items: center;
      justify-content: center;
      border-radius: 0.5rem;
      color: #64748b;
      transition: background-color 0.15s ease, color 0.15s ease;
    }

    .password-toggle:hover {
      background: #f1f5f9;
      color: #0f172a;
    }
  </style>

  <script src="javascripts/register_user.js"></script>
</body>
</html>
